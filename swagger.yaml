        name:
          type: string
          minLength: 3
          example: Marketing workspace
        use_owner_storage:
          type: boolean
          description: When true, workspace files are stored under the workspace owner and count against the owner's storage quota.
          default: false
          example: true
        storage_limit:
          type: integer
          format: int64
          nullable: true
          minimum: 1048576
          description: Owner-backed workspace storage limit in bytes. Leave null for unlimited owner storage. Cannot exceed the owner's remaining available storage when enforced.
          example: 10737418240
    WorkspaceRoleChangePayload:
      type: object
      required:
        - roleId
      properties:
        roleId:
          type: integer
          format: int64
          example: 8
    NewUploadInitRequest:
      type: object
      required:
        - filename
        - size
      properties:
        filename:
          type: string
          example: big-video.mp4
          description: Original filename. The server extracts the extension from this value.
        size:
          type: integer
          format: int64
          example: 209715200
          description: Declared file size in bytes. The server uses this for initial plan, quota and upload mode checks. Final metadata is corrected from the actual uploaded file or S3 object.
        parentId:
          type: integer
          nullable: true
          example: null
          description: Folder ID where the file should be uploaded. If omitted or null, upload goes to root.
        workspaceId:
          type: integer
          nullable: true
          example: null
          description: Workspace ID where the file should be uploaded. If omitted, the server can infer it from parentId when the parent folder belongs to a workspace.
    NewUploadInitResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        uploadSessionId:
          type: string
          example: 984c6f0a-4a19-4969-bc20-123456789abc
          description: Server-side upload session id. Use this id with the next upload endpoints.
        uploadMode:
          type: string
          enum:
            - single
            - s3-single
            - s3-multipart
            - tus
          example: s3-multipart
          description: Selected upload mode. `single` uploads the whole file to this API. `s3-single` uploads one file directly to a signed S3 URL. `s3-multipart` uploads chunks directly to signed S3 URLs. `tus` uses the existing resumable TUS endpoint.
        partSize:
          type: integer
          format: int64
          nullable: true
          example: 20971520
          description: Chunk size in bytes for `s3-multipart` uploads. Null for other modes.
        next:
          type: object
          nullable: true
          description: Instructions for the next upload step. Present for `s3-single` and `tus` modes.
          properties:
            method:
              type: string
              example: PUT
              description: Method or protocol for the next step.
            url:
              type: string
              format: uri
              example: https://s3.example.com/bucket/object?X-Amz-Algorithm=AWS4-HMAC-SHA256
              description: Upload URL. For `s3-single`, send the whole file to this URL with PUT. For `tus`, this is the TUS endpoint.
            headers:
              type: object
              nullable: true
              additionalProperties:
                type: string
              example:
                Content-Type: video/mp4
                x-amz-acl: private
              description: Headers that should be sent with the next upload request when provided.
            completeUrl:
              type: string
              format: uri
              example: https://files.example.com/api/v1/uploads-new/984c6f0a-4a19-4969-bc20-123456789abc/complete
              description: URL to call after the direct S3 or TUS upload finishes.
            metadata:
              type: object
              nullable: true
              additionalProperties:
                type: string
              description: Metadata that should be sent to the TUS endpoint when `uploadMode=tus`.
    NewUploadSignPartsRequest:
      type: object
      required:
        - partNumbers
      properties:
        partNumbers:
          type: array
          example:
            - 1
            - 2
            - 3
          description: S3 multipart part numbers to sign. Part numbers start at 1 and must be between 1 and 10000.
          items:
            type: integer
            minimum: 1
            maximum: 10000
    NewUploadSignedPart:
      type: object
      properties:
        partNumber:
          type: integer
          example: 1
        url:
          type: string
          format: uri
          example: https://s3.example.com/bucket/object?X-Amz-Algorithm=AWS4-HMAC-SHA256
          description: Temporary S3 URL for this part. Send a PUT request to this exact URL with the raw bytes of the matching file chunk. Do not send this PUT request to the Files.ir API base URL.
    NewUploadSignPartsResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        urls:
          type: array
          items:
            $ref: '#/components/schemas/NewUploadSignedPart'
    NewUploadCompleteRequest:
      type: object
      properties:
        parts:
          type: array
          description: Required for `s3-multipart`. Uploaded S3 parts with the ETag response header returned by S3 for each part.
          items:
            type: object
            required:
              - PartNumber
              - ETag
            properties:
              PartNumber:
                type: integer
                example: 1
              ETag:
                type: string
                example: '"9b2cf535f27731c974343645a3985328"'
        uploadKey:
          type: string
          example: 01hxyzUploadKey
          description: Required for `tus`. The upload key from the final TUS upload URL.
    NewUploadFileEntryResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        fileEntry:
          $ref: '#/components/schemas/FileEntry'
    FileEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: image.png
        file_name:
          type: string
          example: j6oWHDG1z613UqFHLZpE1Yrqngw0N8XLuGNLNWJV
          description: actual file name for this entry on storage
        file_size:
          type: integer
          format: int64
          example: 111863
          description: In bytes
        parent_id:
          type: integer
          format: int64
          example: 1
          description: Parent folder ID
        workspace_id:
          type: integer
          format: int64
          example: 0
          description: Workspace ID this entry belongs to. `0` means personal drive.
        parent:
          $ref: '#/components/schemas/FileEntry'
        thumbnail:
          type: string
          example: thumbnail.png
          description: Relative path to thumbnail image for the file (if it exists)
        mime:
          type: string
          example: image/png
        url:
          type: string
          example: secure/uploads/3260
          description: relative url for previewing file or folder contents
        hash:
          type: string
          example: MzI2MHxwYWRkaQ
        type:
          type: string
          enum:
            - 'image'
            - 'folder'
            - 'text'
            - 'audio'
            - 'video'
            - 'pdf'
        description:
          type: string
          example: Example description entered by user
        deleted_at:
          type: string
          example: '2021-02-23T14:42:38.000000Z'
          description: date entry was moved to trash (if it's in trash currently)
        created_at:
          type: string
          example: '2021-02-23T14:42:38.000000Z'
          description: date entry was uploaded
        updated_at:
          type: string
          example: '2021-02-23T14:42:38.000000Z'
          description: date entry was last modified (content, name or location changed)
        path:
          type: string
          example: '3260/3261/3262'
          description: full path of parent folder IDs for this entry up to root
        users:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              email:
                type: string
                example: 'example@gmail.com'
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        access_token:
          type: string
          description: Access token that can be used to authenticate API requests for this user
        display_name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        created_at:
          type: string
          example: '2021-02-23T14:42:38.000000Z'
        updated_at:
          type: string
          example: '2021-02-23T14:42:38.000000Z'
    Workspace:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 5
        name:
          type: string
          example: Marketing workspace
        owner_id:
          type: integer
          format: int64
          example: 3
        use_owner_storage:
          type: boolean
          example: false
        storage_limit:
          type: integer
          format: int64
          nullable: true
          example: null
        storage_used:
          type: integer
          format: int64
          example: 0
        owner_max_upload_size:
          type: integer
          format: int64
          nullable: true
          description: Maximum allowed single file upload size for the workspace owner when owner-backed storage is enabled.
          example: 5368709120
        owner_plan_name:
          type: string
          nullable: true
          description: Workspace owner's plan name when owner-backed storage is enabled.
          example: Pro
        members_count:
          type: integer
          format: int32
          example: 4
        created_at:
          type: string
          format: date-time
          example: '2025-10-21T14:42:38.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-10-21T14:42:38.000000Z'
        owner:
          $ref: '#/components/schemas/WorkspaceMember'
          nullable: true
        current_user:
          $ref: '#/components/schemas/WorkspaceMember'
          nullable: true
        members:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WorkspaceMember'
        invites:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WorkspaceInvite'
      required:
        - id
        - name
        - owner_id
        - members_count
    WorkspaceMember:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID of the user.
          example: 42
        email:
          type: string
          format: email
          example: member@example.com
        workspace_id:
          type: integer
          format: int64
          example: 5
        joined_at:
          type: string
          format: date-time
          nullable: true
          example: '2025-10-21T12:05:31.000000Z'
        role_id:
          type: integer
          format: int64
          nullable: true
          example: 7
        is_owner:
          type: boolean
          example: false
        member_id:
          type: integer
          format: int64
          example: 13
        first_name:
          type: string
          nullable: true
          example: 'Alex'
        last_name:
          type: string
          nullable: true
          example: 'Smith'
        image:
          type: string
          nullable: true
          example: 'https://cdn.files.ir/avatars/alex.jpg'
        role_name:
          type: string
          example: 'Editor'
        name:
          type: string
          example: 'Alex Smith'
        model_type:
          type: string
          example: member
        can_view_activity_logs:
          type: boolean
          example: true
        permissions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WorkspacePermission'
      required:
        - id
        - email
        - member_id
        - is_owner
        - model_type
        - name
    WorkspacePermission:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 12
        name:
          type: string
          example: workspace_activity_logs.view
        restrictions:
          type: object
          nullable: true
          additionalProperties: true
    WorkspaceInvite:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 9b5026a0-2b67-4f4d-bfa3-53e96e3f87f5
        workspace_id:
          type: integer
          format: int64
          example: 5
        role_name:
          type: string
          nullable: true
          example: 'Workspace Editor'
        email:
          type: string
          format: email
          example: invitee@example.com
        role_id:
          type: integer
          format: int64
          nullable: true
          example: 8
        image:
          type: string
          nullable: true
          example: 'https://cdn.files.ir/avatars/invitee.jpg'
    WorkspaceActivityLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 101
        workspace_id:
          type: integer
          format: int64
          example: 5
        user_id:
          type: integer
          format: int64
          nullable: true
          example: 42
        action:
          type: string
          example: invited_user
        subject_type:
          type: string
          nullable: true
          example: user
        subject_id:
          type: integer
          format: int64
          nullable: true
          example: 77
        subject_name:
          type: string
          nullable: true
          example: member@example.com
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          example: '2025-10-21T14:42:38.000000Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-10-21T14:42:38.000000Z'
        user:
          type: object
          nullable: true
          additionalProperties: true
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: Tag
    ShareableLink:
      type: object
      properties:
        id:
          type: integer
          format: int64
        hash:
          type: string
          example: 3h8N1nxZq7WtyRmXDIosFupSl9MCrD
          description: ID for link that will be visible in url
        password:
          type: string
          example: $2y$10$BI8kz6zFeB0CA0P425eMSe7KJcm8OKjWijHTQrRP.cjqRtynMq4Sy
          description: Passwords are hashed, so this will not match the password that was entered in plain text
        user_id:
          type: integer
          format: int64
          description: ID of user that created this link
        entry_id:
          type: integer
          format: int64
          description: ID of file entry this link is attached to
        entry:
          $ref: '#/components/schemas/FileEntry'
        expires_at:
          type: string
          example: '2021-03-06T17:34:00.000000Z'
        allow_edit:
          type: boolean
          example: false
        allow_download:
          type: boolean
          example: false
    Shareable-Link-Response:
      type: object
      properties:
        status:
          type: string
          example: success
        link:
          $ref: '#/components/schemas/ShareableLink'
        folderChildren:
          description: If link is for folder, this will list immediate children of that folder
          type: array
          items:
            $ref: '#/components/schemas/FileEntry'
        errors:
          type: object
          properties:
            some_data_1:
              type: string
              example: Error message for data 1
            some_data_2:
              type: string
              example: Error message for data 2
    401-Response:
      description: Unauthenticated. Either access token is not provided or is invalid.
    403-Response:
      description: Unauthorized access. You don't have permissions required to perform this operation.
    422-Response:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: 'Reason for the error'
        errors:
          type: object
          properties:
            some_data_1:
              type: string
              example: Error message for data 1
            some_data_2:
              type: string
              example: Error message for data 2

  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
