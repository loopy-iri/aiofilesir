                summary: Owner-backed workspace with storage limit
                value:
                  name: Agency workspace
                  use_owner_storage: true
                  storage_limit: 10737418240
      responses:
        '200':
          description: Workspace created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
