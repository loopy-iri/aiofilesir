openapi: 3.0.0
info:
  description: 'Access token should be sent along with every request to Files.ir API in authorization header: `Authorization: Bearer <Token>` <br> This token can either be acquired via `auth/login` endpoint or by going to account settings > developers on [Files.ir website](SITE_URL/account-settings/#developers).'
  version: '1.0.0'
  title: Files.ir API
security:
  - accessToken: []
tags:
  - name: Uploads
    description: Upload files to Files.ir
  - name: Uploads-new
    description: Session based upload flow for API clients, including large S3 multipart uploads
  - name: Auth
    description: Authenticate requests to the API
  - name: Files and Folders
    description: FileEntry refers to either a file or folder on Files.ir
  - name: Storage
    description: Storage usage and limits for current user
  - name: Sharing
    description: Manage file entry collaborators
  - name: Starring
    description: Mark or unmark entries as starred
  - name: Shareable Links
    description: Manage shareable links for file or folder
  - name: Workspaces
    description: Manage collaborative workspaces
  - name: Tags
    description: Manage tags and taggable relationships
paths:
  /user/space-usage:
    get:
      tags:
        - Storage
      summary: Get current user storage usage
      description: Returns allowed storage, used storage, and remaining storage for the authenticated user. All values are in bytes.
      operationId: spaceUsage
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  used:
                    type: integer
                    format: int64
                    example: 3793236
                    description: Used bytes
                  available:
                    type: integer
                    format: int64
                    example: 2147483648
                    description: Total allowed bytes (null for unlimited)
                    nullable: true
                  remaining:
                    type: integer
                    format: int64
                    example: 2143680412
                    description: Remaining bytes (null for unlimited)
                    nullable: true
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
  /uploads:
    post:
      tags:
        - Uploads
      summary: Upload a file to Files.ir
      operationId: upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Content of file to upload to Files.ir
                parentId:
                  type: integer
                  description: ID of folder where this file should be uploaded, `null` will upload to root
                  example: null
                workspaceId:
                  type: integer
                  description: ID of workspace where this file should be uploaded. If omitted or `0`, upload goes to personal drive.
                  example: 123
                relativePath:
                  type: string
                  description: "Folders in the path provided here will be auto created, if they don't exist already. This is mainly useful when uploading a folder from browser. It should include original filename as well: <br> `/some/folders/here/file-name.jpg`"
      responses:
        '201':
          description: File was uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  fileEntry:
                    $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /uploads-new/init:
    post:
      tags:
        - Uploads-new
      summary: Start a new upload session
      operationId: initNewUpload
      description: |
        Creates an upload session and lets the server choose the upload mode.

        Use this endpoint before uploading through the new upload API. The server validates the user's plan, storage space, workspace access and storage availability, then returns an `uploadSessionId`.

        The server follows the same upload strategy as the web drive uploader:

        - S3 storage with direct upload enabled and file size under 100MB: `uploadMode=s3-single`. Upload the file with one `PUT` request to `next.url`, then call `next.completeUrl`.
        - S3 storage with direct upload enabled and file size 100MB or more: `uploadMode=s3-multipart`. Split the file into chunks using `partSize`, request signed URLs for part numbers, upload each chunk directly to S3, then call `/uploads-new/{sessionId}/complete`.
        - Non-S3 storage or direct upload disabled and file size under 4MB: `uploadMode=single`. Send the file to `/uploads-new/{sessionId}/file`.
        - Non-S3 storage or direct upload disabled and file size 4MB or more: `uploadMode=tus`. Use the existing TUS upload endpoint and metadata returned in `next.metadata`, then call `next.completeUrl` with the final `uploadKey`.

        `storageLocationId`, S3 object key, bucket and multipart upload id are intentionally not returned. They are kept in the server-side session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUploadInitRequest'
      responses:
        '201':
          description: Upload session was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUploadInitResponse'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid upload metadata or not enough storage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /uploads-new/{sessionId}/file:
    post:
      tags:
        - Uploads-new
      summary: Upload a file for a server-side single-request session
      operationId: uploadNewSingleFile
      description: |
        Uploads the actual file for sessions where `/uploads-new/init` returned `uploadMode=single`.

        The server uses the actual uploaded file metadata as the final source of truth. If the file size differs from the size provided during init, final validation uses the actual file size.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Upload session id returned by `/uploads-new/init`
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: File content to upload
      responses:
        '201':
          description: File was uploaded and registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUploadFileEntryResponse'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '404':
          description: Upload session was not found or does not belong to current user
        '422':
          description: Invalid file or storage validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /uploads-new/{sessionId}/parts/sign:
    post:
      tags:
        - Uploads-new
      summary: Sign S3 multipart upload parts
      operationId: signNewUploadParts
      description: |
        Returns temporary signed URLs for multipart part numbers.

        This endpoint does not upload file bytes. It only asks the Files.ir API to create signed S3 URLs for the requested part numbers.

        Use this endpoint only when `/uploads-new/init` returned `uploadMode=s3-multipart`. The client should split the file into chunks using the `partSize` returned by init. Part numbers start at `1` and must not exceed `10000`.

        After this endpoint returns, upload each chunk with `PUT` to the matching signed URL returned in the response. These `PUT` requests go directly to S3, not to the Files.ir API base URL. Save the `ETag` response header from S3 for each uploaded part; those ETags are required by `/uploads-new/{sessionId}/complete`.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Upload session id returned by `/uploads-new/init`
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUploadSignPartsRequest'
      responses:
        '200':
          description: Signed URLs were generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUploadSignPartsResponse'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '404':
          description: Upload session was not found or does not belong to current user
        '422':
          description: Invalid part numbers or storage validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /uploads-new/{sessionId}/complete:
    post:
      tags:
        - Uploads-new
      summary: Complete a direct S3, S3 multipart or TUS upload
      operationId: completeNewUpload
      description: |
        Completes an upload session and creates the final file entry.

        For `s3-single`, call this endpoint after the file was uploaded to `next.url`. No request body is required.

        For `s3-multipart`, call this endpoint only after every `PUT` request to the signed S3 URLs has completed successfully. Send all uploaded parts with their `PartNumber` and `ETag` values. After S3 completes the upload, the server reads the final object metadata from S3 and uses the actual object size and content type when creating the file entry.

        For `tus`, send the final `uploadKey` returned in the TUS upload URL. This endpoint will finalize the TUS upload using the existing project flow.

        If the declared init size differs from the actual uploaded file or S3 object, final metadata is corrected from the actual uploaded content.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Upload session id returned by `/uploads-new/init`
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUploadCompleteRequest'
      responses:
        '200':
          description: Upload was completed and file entry was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewUploadFileEntryResponse'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '404':
          description: Upload session was not found or does not belong to current user
        '422':
          description: S3 completion failed or metadata validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /uploads-new/{sessionId}:
    delete:
      tags:
        - Uploads-new
      summary: Cancel an upload session
      operationId: abortNewUpload
      description: |
        Cancels a pending upload session. For S3 multipart sessions, the server also attempts to abort the remote multipart upload.
      parameters:
        - name: sessionId
          in: path
          required: true
          description: Upload session id returned by `/uploads-new/init`
          schema:
            type: string
      responses:
        '200':
          description: Upload session was cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
  /drive/file-entries:
    get:
      tags:
        - Files and Folders
      summary: Get file entries
      description: Get the list of all file entries you have access to
      operationId: indexEntry
      parameters:
        - name: perPage
          in: query
          description: How many entries to return per page
          schema:
            type: 'integer'
            format: 'int64'
            default: 50
        - name: deletedOnly
          in: query
          description: Whether only trashed entries should be returned
          schema:
            type: 'boolean'
        - name: starredOnly
          in: query
          description: Whether only starred entries should be returned
          schema:
            type: 'boolean'
        - name: recentOnly
          in: query
          description: Whether only recent entries should be returned
          schema:
            type: 'boolean'
        - name: sharedOnly
          in: query
          description: Whether only entries that have been shared with you should be returned
          schema:
            type: 'boolean'
        - name: query
          in: query
          description: Search query entry names should be filtered on
          schema:
            type: 'string'
        - name: type
          in: query
          description: File type entries should be filtered on
          schema:
            type: 'string'
            enum:
              - 'folder'
              - 'image'
              - 'text'
              - 'audio'
              - 'video'
              - 'pdf'
        - name: parentIds
          in: query
          description: Only entries that are children of specified folders will be returned
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: workspaceId
          in: query
          description: Only return entries in specified workspace
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
  /file-entries/delete:
    post:
      tags:
        - Files and Folders
      summary: Move entries to trash or delete permanently
      description: Permanently deleting entries (`deleteForever=true`) only works for items that are already in trash.
      operationId: entriesDelete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entryIds:
                  description: list of entry IDs to delete
                  type: array
                  items:
                    type: string
                deleteForever:
                  description: Whether entries should be deleted permanently, instead of being moved to trash. Only applies to entries already in trash.
                  type: string
                  example: false
      responses:
        '200':
          description: Entries deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'

  /file-entries/{entryId}:
    get:
      tags:
        - Files and Folders
      summary: Download a file entry
      description: Retrieve the binary contents of a file entry. Optionally supply `thumbnail=1` to fetch the generated thumbnail instead of the original file or pass a preview/access token for shared files.
      parameters:
        - in: path
          name: entryId
          schema:
            type: integer
          required: true
          description: ID of the file entry to download
        - in: query
          name: thumbnail
          schema:
            type: boolean
          description: When true and the file has a thumbnail, return the thumbnail instead of the original file
        - in: query
          name: preview_token
          schema:
            type: string
          description: Temporary preview token that grants read-only access without requiring authentication headers
        - in: query
          name: accessToken
          schema:
            type: string
          description: Personal access token to use when the Authorization header cannot be sent
      operationId: entryDownload
      responses:
        '200':
          description: Binary file stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '404':
          description: File entry not found
    put:
      tags:
        - Files and Folders
      summary: Update an existing file entry
      parameters:
        - in: path
          name: entryId
          schema:
            type: integer
          required: true
      operationId: entryUpdate
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  fileEntry:
                    $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 'New name for the entry'
                description:
                  type: string
                  example: 'New description for the entry'

  /folders:
    post:
      tags:
        - Files and Folders
      summary: Create a new folder
      operationId: createFolder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: 'new folder name'
                parentId:
                  type: integer
                  description: 'ID of parent folder or null if it should be created at root'
                  example: null
      responses:
        '200':
          description: Folder created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  folder:
                    $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'

  /file-entries/move:
    post:
      tags:
        - Files and Folders
      summary: Move specified entries to another folder or workspace
      description: |
        Move one or more file entries to a new folder. If `targetWorkspaceId` is provided, the files will also be transferred into that workspace (setting it to `0` moves them back to the personal workspace).
      operationId: entriesMove
      responses:
        '200':
          description: File entries moved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - entryIds
              properties:
                entryIds:
                  description: List of entry ids
                  type: array
                  items:
                    type: integer
                    format: 'int32'
                destinationId:
                  type: integer
                  format: 'int32'
                  description: ID of folder specified entries should be moved to
                  example: null
                targetWorkspaceId:
                  type: integer
                  format: 'int32'
                  description: ID of workspace that should own the entries after the move. Omit or set to 0 to keep them in the current workspace.
                  example: 15
              example:
                entryIds:
                  - 1
                  - 2
                  - 3
                destinationId: null
                targetWorkspaceId: 15
  /file-entries/duplicate:
    post:
      tags:
        - Files and Folders
      summary: Duplicate specified entries
      operationId: entriesCopy
      responses:
        '200':
          description: File entries duplicated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/FileEntry'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - entryIds
              properties:
                entryIds:
                  description: List of entry ids
                  type: array
                  items:
                    type: integer
                    format: 'int32'
                destinationId:
                  type: integer
                  format: 'int32'
                  description: ID of folder specified entries should be moved to
                  example: null
  /file-entries/restore:
    post:
      tags:
        - Files and Folders
      summary: Restore file entries from trash to original folder
      operationId: entriesRestore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - entryIds
              properties:
                entryIds:
                  description: List of entry IDs
                  type: array
                  items:
                    type: integer
                    format: 'int32'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'

  /file-entries/{entryId}/share:
    post:
      tags:
        - Sharing
      summary: Share file or folder with specified users
      parameters:
        - in: path
          name: entryId
          schema:
            type: integer
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    example: example@gmail.com
                permissions:
                  type: array
                  items:
                    type: string
                    example: edit
                    enum:
                      - view
                      - edit
                      - download
      responses:
        '200':
          description: Shared file entry successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /file-entries/{entryId}/change-permissions:
    put:
      tags:
        - Sharing
      summary: Change permissions user has for shared entries
      parameters:
        - in: path
          name: entryId
          schema:
            type: integer
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
                permissions:
                  type: array
                  items:
                    type: string
                    example: edit
                    enum:
                      - view
                      - edit
                      - download
      responses:
        '200':
          description: Changed permissions successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /file-entries/{entryId}/unshare:
    delete:
      tags:
        - Sharing
      summary: Unshare file or folder with specified user
      parameters:
        - in: path
          name: entryId
          schema:
            type: integer
            example: 1
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: integer
      responses:
        '200':
          description: Unshared file entry successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'

  /file-entries/star:
    post:
      tags:
        - Starring
      summary: Mark specified entries as starred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entryIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Marked as starred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  tag:
                    $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
          $ref: '#/components/schemas/403-Response'
        '422':
          description: Invalid data specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422-Response'
  /file-entries/unstar:
    post:
      tags:
        - Starring
      summary: Unmark specified entries as starred
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entryIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Unmarked as starred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  tag:
                    $ref: '#/components/schemas/Tag'
        '401':
          $ref: '#/components/schemas/401-Response'
        '403':
